version: "3.7"
services:
  postgres:
    # image: postgis/postgis:17-3.5
    build: ./docker
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
      # - APP_USER=app
      # - APP_PASSWORD=s3cret
      # - APP_DB=app
    ports:
      - "6002:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: ["postgres", "-c", "log_statement=all"]
volumes:
  postgres-data:
